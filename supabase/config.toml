# Supabase CLI config — tells `supabase functions deploy` where each
# function's entry file is (we use plain-JS index.js, not index.ts).

project_id = "awqrddumrfbljqmakivv"

[functions.send-chef-list]
entrypoint = "./functions/send-chef-list/index.js"

[functions.notify-change]
entrypoint = "./functions/notify-change/index.js"

[functions.daily-funny]
entrypoint = "./functions/daily-funny/index.js"

[functions.cancel-lunch]
entrypoint = "./functions/cancel-lunch/index.js"
# The cancel link in emails must work without login:
verify_jwt = false

# 10:00 AM post: defaults IN + today's list to Basecamp.
[functions.morning-invite]
entrypoint = "./functions/morning-invite/index.js"

# 11:00 AM reminder post ("15 minutes left").
[functions.midday-confirm]
entrypoint = "./functions/midday-confirm/index.js"

[functions.join-lunch]
entrypoint = "./functions/join-lunch/index.js"
# The join button in emails must work without login:
verify_jwt = false

[functions.basecamp-lunch]
entrypoint = "./functions/basecamp-lunch/index.js"
# Basecamp sends no Supabase auth header:
verify_jwt = false

[functions.last-call]
entrypoint = "./functions/last-call/index.js"

[functions.dashboard-auth]
entrypoint = "./functions/dashboard-auth/index.js"
# The login page has no Supabase auth token to send:
verify_jwt = false